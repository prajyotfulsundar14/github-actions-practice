name: CICD
on:
  workflow_dispatch:

jobs:
  code:
    runs-on: ubuntu-latest
    steps:
        - name: Clone the code
          run: echo "Cloning the code"
  build:
    needs: [code]
    runs-on: ubuntu-latest
    steps:
      - name: Building using Docker
        run: echo "Building using Docker"

  test:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Testing on Ubuntu
        run: echo "testing the code"
  deploy:
    needs: [build,test]
    runs-on: ubuntu-latest
    steps:
      - name: Deplyoing Code
        run: echo "Deplyoing code"
